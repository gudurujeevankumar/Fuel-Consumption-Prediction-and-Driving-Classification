<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <defs>
    <linearGradient id="coolEdge" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ef4444"/> <!-- Red (Empty/Aggressive) -->
      <stop offset="50%" stop-color="#f59e0b"/> <!-- Orange -->
      <stop offset="100%" stop-color="#00d2aa"/> <!-- Cyan (Full/Eco) -->
    </linearGradient>
  </defs>

  <!-- Dark Rounded App Box -->
  <rect width="120" height="120" rx="28" fill="#0b0f1e" />

  <!-- Background Gauge Arc -->
  <path d="M 20 85 A 40 40 0 0 1 100 85" fill="none" stroke="#1f2937" stroke-width="18" stroke-linecap="round" />
  
  <!-- Colored Fuel/Speed Arc -->
  <path d="M 20 85 A 40 40 0 0 1 85 45" fill="none" stroke="url(#coolEdge)" stroke-width="18" stroke-linecap="round" />

  <!-- Solid White Needle Center -->
  <circle cx="60" cy="85" r="10" fill="#ffffff" />
  
  <!-- Solid White Needle pointing right (Eco/Good) -->
  <path d="M 60 85 L 88 42" stroke="#ffffff" stroke-width="10" stroke-linecap="round" />
</svg>