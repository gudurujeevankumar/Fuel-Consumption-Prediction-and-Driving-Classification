<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" shape-rendering="geometricPrecision">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1628"/>
      <stop offset="100%" style="stop-color:#0d2040"/>
    </linearGradient>
    <linearGradient id="bolt" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00e5b8"/>
      <stop offset="100%" style="stop-color:#00b896"/>
    </linearGradient>
    <linearGradient id="chip" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a3a5c"/>
      <stop offset="100%" style="stop-color:#0f2540"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="0.8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background: rounded square -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>

  <!-- ECU Chip body -->
  <rect x="9" y="9" width="14" height="14" rx="2.5" fill="url(#chip)" stroke="#1e4a7a" stroke-width="0.7"/>

  <!-- Chip pins - left side -->
  <rect x="6" y="11.5" width="3" height="1.5" rx="0.5" fill="#1e4a7a"/>
  <rect x="6" y="14.5" width="3" height="1.5" rx="0.5" fill="#1e4a7a"/>
  <rect x="6" y="17.5" width="3" height="1.5" rx="0.5" fill="#1e4a7a"/>

  <!-- Chip pins - right side -->
  <rect x="23" y="11.5" width="3" height="1.5" rx="0.5" fill="#1e4a7a"/>
  <rect x="23" y="14.5" width="3" height="1.5" rx="0.5" fill="#1e4a7a"/>
  <rect x="23" y="17.5" width="3" height="1.5" rx="0.5" fill="#1e4a7a"/>

  <!-- Chip pins - top -->
  <rect x="11.5" y="6" width="1.5" height="3" rx="0.5" fill="#1e4a7a"/>
  <rect x="14.5" y="6" width="1.5" height="3" rx="0.5" fill="#1e4a7a"/>
  <rect x="17.5" y="6" width="1.5" height="3" rx="0.5" fill="#1e4a7a"/>

  <!-- Chip pins - bottom -->
  <rect x="11.5" y="23" width="1.5" height="3" rx="0.5" fill="#1e4a7a"/>
  <rect x="14.5" y="23" width="1.5" height="3" rx="0.5" fill="#1e4a7a"/>
  <rect x="17.5" y="23" width="1.5" height="3" rx="0.5" fill="#1e4a7a"/>

  <!-- Lightning bolt (ML/energy symbol) - centered in chip -->
  <path d="M17.2 10.5 L14 16.5 H16.5 L14.8 21.5 L19 15 H16.5 Z"
        fill="url(#bolt)" filter="url(#glow)"/>

  <!-- Corner dots on chip -->
  <circle cx="10.5" cy="10.5" r="0.6" fill="#00e5b8" opacity="0.6"/>
  <circle cx="21.5" cy="10.5" r="0.6" fill="#00e5b8" opacity="0.6"/>
  <circle cx="10.5" cy="21.5" r="0.6" fill="#00e5b8" opacity="0.6"/>
  <circle cx="21.5" cy="21.5" r="0.6" fill="#00e5b8" opacity="0.6"/>
</svg>