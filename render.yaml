services:
  - type: web
    name: ecu-analytics
    env: python
    plan: free
    buildCommand: "pip install -r requirements.txt && python start.py" # start.py is run once here purely to seed database if needed and load ML models
    startCommand: "gunicorn wsgi:app"
    envVars:
      - key: PORT
        value: 10000
      - key: PYTHON_VERSION
        value: 3.9.0
      - key: SECRET_KEY
        sync: false
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_NAME
        sync: false
